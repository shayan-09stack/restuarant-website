<!DOCTYPE html>
<html>
<head>
<title>Karachi Bites</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:#fff;
}

header {
    text-align:center;
    padding:120px 20px;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
    url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
}

h1 { color:#d4af37; font-size:55px; }

.menu {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card {
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}
.card:hover { transform:scale(1.05); }

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3 { margin:10px; }

.cart-btn {
    position:fixed;
    top:20px;
    right:20px;
    background:#d4af37;
    padding:10px 15px;
    cursor:pointer;
}

.modal, .cart {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.modal-content, .cart-content {
    background:#111;
    padding:20px;
    width:300px;
}

button {
    background:#d4af37;
    border:none;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Karachi Bites</h1>
<p>Luxury Food Ordering</p>
</header>

<div class="cart-btn" onclick="openCart()">Cart (<span id="cartCount">0</span>)</div>

<div class="menu" id="menu"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h2 id="itemName"></h2>
<p id="itemPrice"></p>
<button onclick="addToCart()">Add to Cart</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<div class="cart-content">
<h2>Checkout</h2>
<ul id="cartItems"></ul>
<input placeholder="Your Name">
<input placeholder="Phone Number">
<button onclick="checkout()">Place Order</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<script>
const items = [
{name:"Burger",price:450,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:900,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
{name:"BBQ",price:1200,img:"https://images.unsplash.com/photo-1598514982849-5cceac1b02b7"},
{name:"Fries",price:350,img:"https://images.unsplash.com/photo-1604908176997-431e9c8d9c77"}
];

let selectedItem=null;
let cart=[];

const menu=document.getElementById("menu");

items.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
        <img src="${item.img}">
        <h3>${item.name}</h3>
    `;
    div.onclick=()=>openModal(item);
    menu.appendChild(div);
});

function openModal(item){
    selectedItem=item;
    document.getElementById("itemName").innerText=item.name;
    document.getElementById("itemPrice").innerText="Rs."+item.price;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function addToCart(){
    cart.push(selectedItem);
    document.getElementById("cartCount").innerText=cart.length;
    closeModal();
}

function openCart(){
    document.getElementById("cart").style.display="flex";
    let list=document.getElementById("cartItems");
    list.innerHTML="";
    cart.forEach(i=>{
        let li=document.createElement("li");
        li.innerText=i.name+" - Rs."+i.price;
        list.appendChild(li);
    });
}

function closeCart(){
    document.getElementById("cart").style.display="none";
}

function checkout(){
    alert("Order placed! (Demo)");
}
</script>

</body>
</html>
