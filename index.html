<!DOCTYPE html>
<html>
<head>
    <title>Karachi Bites</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f8f8f8;
        }

        header {
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
            color: white;
            padding: 120px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 55px;
        }

        nav {
            background: #111;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        .menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 20px;
            width: 260px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .btn {
            background: #ff4d4d;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }

        footer {
            background: #111;
            color: white;
            padding: 20px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header id="home">
    <h1>Karachi Bites</h1>
    <p>Fresh • Fast • Delicious</p>
    <a href="https://wa.me/923001234567?text=Hi%20I%20want%20to%20order" class="btn">Order on WhatsApp</a>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Contact</a>
</nav>

<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <h3>Zinger Burger</h3>
            <p>Rs. 450</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598514982849-5cceac1b02b7">
            <h3>BBQ Platter</h3>
            <p>Rs. 1200</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604908176997-431e9c8d9c77">
            <h3>Loaded Fries</h3>
            <p>Rs. 350</p>
        </div>
    </div>

</section>

<section>
    <h2>Why Choose Us?</h2>
    <p>✔ Premium Quality Food | ✔ Quick Delivery | ✔ Affordable Prices</p>
</section>

<section id="contact">
    <h2>Visit Us</h2>

    <iframe src="https://maps.google.com/maps?q=karachi&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

    <p>📞 0300-1234567</p>
</section>

<footer>
    <p>© 2026 Karachi Bites</p>
</footer>

</body>
</html>
