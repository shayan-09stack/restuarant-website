<!DOCTYPE html>
<html>
<head>
    <title>Karachi Bites</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            color: #eee;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                        url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1200&q=80') center/cover;
            padding: 140px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 60px;
            color: #d4af37;
        }

        .btn {
            background: #d4af37;
            color: black;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        nav {
            background: #111;
            text-align: center;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: #d4af37;
            margin: 15px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        section {
            padding: 60px 20px;
        }

        h2 {
            color: #d4af37;
            text-align: center;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(212,175,55,0.3);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }

        .card p {
            color: #d4af37;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            border: none;
        }

        footer {
            background: #111;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<header id="home">
    <h1>Karachi Bites</h1>
    <p>Luxury Dining Experience</p>
    <a href="https://wa.me/923001234567?text=Hi%20I%20want%20to%20order" class="btn">Order Now</a>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Contact</a>
</nav>

<section id="menu" class="container">
    <h2>Our Premium Menu</h2>

    <div class="menu">

        <div class="card"><img loading="lazy" src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger"><h3>Zinger Burger</h3><p>Rs. 450</p></div>
        <div class="card"><img loading="lazy" src="https://images.unsplash.com/photo-1598514982849-5cceac1b02b7" alt="BBQ"><h3>BBQ Platter</h3><p>Rs. 1200</p></div>
        <div class="card"><img loading="lazy" src="https://images.unsplash.com/photo-1604908176997-431e9c8d9c77" alt="Fries"><h3>Loaded Fries</h3><p>Rs. 350</p></div>

        <!-- You can repeat same structure for remaining items -->

    </div>
</section>

<section id="contact" class="container">
    <h2>Visit Us</h2>
    <iframe src="https://maps.google.com/maps?q=karachi&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
    <p>📞 0300-1234567</p>
</section>

<footer>
    <p>© 2026 Karachi Bites</p>
</footer>

</body>
</html>
